<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FenBridge — Request Spot Listing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "tertiary": "#ffb3af",
                    "surface-container-low": "#1c1b1b",
                    "on-secondary-fixed": "#23005c",
                    "surface-variant": "#353534",
                    "primary-fixed-dim": "#4edea3",
                    "inverse-surface": "#e5e2e1",
                    "surface-container-high": "#2a2a2a",
                    "surface-container-highest": "#353534",
                    "secondary": "#d0bcff",
                    "on-tertiary-fixed": "#410005",
                    "primary-fixed": "#6ffbbe",
                    "tertiary-container": "#fc7c78",
                    "outline": "#86948a",
                    "tertiary-fixed-dim": "#ffb3af",
                    "surface-dim": "#131313",
                    "background": "#131313",

                    "on-error": "#690005",

                    "lg": "24px"
            },
            "fontFamily": {

                    "body-md": ["Inter"],

<style>
      body {
        background-color: #131313;
        color: #e5e2e1;
        -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .card-border {
        border: 1px solid #2D2D2D;
      }
      .glass-effect {
        background: rgba(30, 30, 30, 0.8);
        backdrop-filter: blur(8px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="sticky top-0 z-50 bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-on-surface hover:opacity-80 transition-opacity p-base active:scale-95 transition-transform duration-150" data-icon="close">close</button>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg text-on-surface">Request Spot Listing</span>
<span class="font-label-sm text-label-sm text-outline">Step 1 of 4</span>
</div>
</div>
<div class="w-24 h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/4"></div>
</div>
</header>
<main class="flex-grow px-margin py-xl max-w-2xl mx-auto w-full">
<!-- Main Heading -->
<h1 class="font-headline-lg text-headline-lg mb-xl text-on-surface">Where is this lot from?</h1>
<!-- Selection Grid (Bento Style Layout) -->
<div class="grid grid-cols-1 gap-md mb-xl">
<!-- Option 1: PO -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="source" type="radio"/>
<div class="card-border rounded-xl p-lg bg-surface-container-low peer-checked:border-primary peer-checked:bg-surface-container transition-all hover:bg-surface-container-high active:scale-[0.99] duration-200">
<div class="flex items-start gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="package_2">package_2</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md mb-xs text-on-surface">From a completed PO</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Excess stock from an order you fulfilled</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline peer-checked:border-primary flex items-center justify-center transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</div>
</label>
<!-- Option 2: Pond (Selected) -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="source" type="radio"/>
<div class="card-border rounded-xl p-lg bg-surface-container-low border-primary bg-surface-container transition-all hover:bg-surface-container-high active:scale-[0.99] duration-200">
<div class="flex items-start gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="grass">grass</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md mb-xs text-on-surface">From my pond</h3>
<p class="font-body-md text-body-md text-on-surface-variant">New harvest ready to list</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
</div>
</div>
</div>
</label>
</div>
<!-- Picker Section (Visible when 'Pond' is selected) -->
<section class="mt-xl">
<div class="flex items-center justify-between mb-sm">
<h2 class="font-label-lg text-label-lg text-outline uppercase tracking-wider">Select Pond</h2>
</div>
<div class="space-y-sm">
<div class="card-border rounded-xl bg-surface-container-low overflow-hidden transition-all duration-300">
<div class="flex items-center p-lg gap-md relative">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="A wide angle, aerial cinematic shot of a lush makhana aquatic farm in rural India during golden hour. The sunlight reflects off the calm water surface where large green lily pads float in a structured grid. The atmosphere is peaceful, showcasing high-end agricultural precision with deep emerald and rich dark earth tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoC1zen486AGy9rIECGH4YdH-J5wAzW_eTC8kvwTZhhHuUvUuDSwQMLjTKSauu4S0aJedODjTzxwKGczu0NUcQ0i56p5BdEeamnuUB0PWJuFZJvr02FQiX49MH0ed-y_Rmp8Y-nJi9NVnAbHThRbtYTtB6auUlJ1mEzNr1cYlAC7whVW4s1Qn9fwU3gi1VwmjoSgDnQ4Luw0_iVboQQ54BjINr66UH5N-kgeRZrStgdK6Hj6GzlgqEIe8QMkBzPg0ed63btHkaFWiT"/>
</div>
<div class="flex-grow">
<div class="flex items-center gap-xs">
<span class="font-headline-md text-headline-md text-on-surface">Pond DNJ-0042</span>
<span class="px-xs py-[2px] rounded bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-tight border border-primary/20">Active</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">2.5 acres · Last harvest 18 May</p>
</div>
<button class="material-symbols-outlined text-outline hover:text-primary transition-colors" data-icon="unfold_more">unfold_more</button>
</div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant ml-base">Select the pond where this lot will come from.</p>
</div>
</section>
<!-- Visual Contextual Element (Asymmetric Detail) -->
<div class="mt-xl p-lg rounded-xl bg-surface-container-highest/30 border border-outline-variant/30 flex items-center gap-md">
<span class="material-symbols-outlined text-primary scale-110" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-md text-body-md text-on-surface-variant italic">
                Verified ponds ensure higher buyer confidence and faster transaction cycles.
            </p>
</div>
</main>
<!-- Bottom Sticky Navigation -->
<footer class="sticky bottom-0 w-full z-50 glass-effect p-margin pb-safe">
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-xl font-label-lg text-label-lg flex items-center justify-center gap-sm hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/10">
            Continue
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
