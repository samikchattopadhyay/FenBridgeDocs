<body class="min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary selection:text-on-primary">
<!-- TopAppBar Segment (Contextual Task Shell) -->
<nav class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md sticky top-0 z-50">
<div class="flex items-center gap-sm">
<button class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">Mark Lot Ready</h1>
</div>
<div class="flex flex-col items-end">
<span class="font-label-lg text-label-lg text-on-surface-variant">2 of 4</span>
<div class="w-20 h-1.5 bg-surface-container-highest rounded-full mt-1 overflow-hidden">
<div class="bg-primary h-full w-1/2 rounded-full"></div>
</div>
</div>
</nav>
<main class="flex-1 px-margin py-lg max-w-2xl mx-auto w-full">
<!-- Heading -->
<header class="mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface">How much are you bagging?</h2>
<p class="font-body-md text-on-surface-variant mt-xs">Update your actual yield compared to the order estimate.</p>
</header>
<!-- PO Context Card (Glassmorphism inspired) -->
<section class="bg-surface-container border border-outline-variant p-md rounded-xl mb-xl relative overflow-hidden">
<div class="absolute top-0 right-0 p-md opacity-10">
<span class="material-symbols-outlined text-[64px]" data-icon="inventory_2">inventory_2</span>
</div>
<div class="relative z-10 flex flex-col gap-xs">
<div class="flex items-center gap-xs">
<span class="bg-primary/10 text-primary font-label-sm text-label-sm px-xs py-1 rounded">PO-2026-0042</span>
<span class="text-on-surface-variant">•</span>
<span class="font-label-lg text-label-lg text-on-surface">Grade A</span>
</div>
<div class="flex items-baseline gap-xs mt-xs">
<span class="text-on-surface-variant font-body-md">Expected:</span>
<span class="text-primary font-headline-md text-headline-md">500 kg</span>
</div>
</div>
</section>
<!-- Form Sections -->
<div class="flex flex-col gap-xl">
<!-- Section 1 — Bagged quantity -->
<div class="group">
<label class="font-label-lg text-label-lg text-on-surface-variant block mb-sm group-focus-within:text-primary transition-colors" for="quantity">Bagged quantity</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border border-outline-variant rounded-lg px-md font-headline-md text-headline-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none outline-none" id="quantity" type="number" value="500"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant font-label-lg uppercase">kg</span>
</div>
</div>
<!-- Section 2 — Bags -->
<div class="group">
<label class="font-label-lg text-label-lg text-on-surface-variant block mb-sm group-focus-within:text-primary transition-colors" for="bags">Number of bags</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border border-outline-variant rounded-lg px-md font-headline-md text-headline-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none outline-none" id="bags" type="number" value="10"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant font-label-lg">BAGS</span>
</div>
<div class="mt-sm flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="info">info</span>
<p class="font-label-sm text-label-sm">Average weight per bag: 50 kg</p>
</div>
</div>
</div>
<!-- Visual Aesthetic Illustration -->
<div class="mt-xl opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
<img alt="Makhana sorting process" class="w-full h-32 object-cover rounded-xl border border-outline-variant" data-alt="A high-contrast macro shot of fox nuts being sorted in a modern agri-tech facility. The lighting is dramatic and cinematic, with deep shadows and vibrant emerald green highlights reflecting off metallic surfaces. The aesthetic is clean, professional, and sophisticated, emphasizing the premium quality of the agricultural product in a dark, tech-focused environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7HXP0zbHSh5akrkS9dgkziBeQXdm3WuvsH293OTIEOMn2JKJJL-ldcuqnOqvUdK8dyFSMZu_3tINeDITlwzWBzrop8drY2z1fuhmngdaJdC3boCySHrMLzmKCfKvk0CtQi1nDW_-SS_lA6zcDuKsB65WiEhkpfL89Z5otezSCTFigSBEM79IewJl423JvqMBBXxbjTz2YKwr_jf8ZBQ_3N0ohCDv-iGJZu3d-a5Mb4mn6lpoljyTaNfnxMlchXxFWtrp4vnbbfoUY"/>
</div>

<footer class="sticky bottom-0 w-full bg-surface/80 backdrop-blur-lg px-margin py-lg border-t border-outline-variant/10">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm">
                Continue

</button>
</div>
</footer>
