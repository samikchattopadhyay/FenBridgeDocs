<!DOCTYPE html>

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .role-tile-shadow {
      box-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.4);
    }
    .inner-glow {
      box-shadow: inset 0 0.5px 0 0 rgba(255, 255, 255, 0.1);
    }
    body {
      background-color: #121212;
      color: #e5e2e1;
    }
    body {
      min-height: max(884px, 100dvh);
    }
  
        ::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

<body class="min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md docked full-width top-0 z-50">
<div class="flex items-center gap-md">
<button onclick="window.location.href='../login/code.html'" class="material-symbols-outlined text-primary dark:text-primary hover:opacity-80 transition-opacity p-xs" data-icon="arrow_back">arrow_back</button>
</div>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">FenBridge</span>
<button onclick="window.location.href='../../scout/scout_dashboard/scout_today_dashboard/code.html'" aria-label="Skip Selection" class="font-label-lg text-label-lg text-primary dark:text-primary hover:opacity-80 transition-opacity px-xs">Skip</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-margin pt-md pb-24 max-w-lg mx-auto w-full">
<div class="mb-md text-center md:text-left">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-1 truncate whitespace-nowrap">Confirm Your Role</h1>
<p class="font-body-md text-sm text-on-surface-variant">Your account is associated with the following role.</p>
</div>
<!-- Role Selection Grid -->
<div class="grid grid-cols-1 gap-sm">
<!-- Scout Tile Option -->
<label class="block relative group cursor-pointer">
<input class="hidden peer" name="role" type="radio" value="scout" checked />
<div class="flex items-center p-sm rounded-xl border-2 border-primary bg-surface-container text-left transition-all duration-200 active:scale-95 shadow-md overflow-hidden relative inner-glow gap-sm">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center transition-all duration-300 shrink-0">
<span class="material-symbols-outlined text-[24px]" data-icon="explore">explore</span>
</div>
<div class="flex-1 min-w-0">
<h2 class="font-headline-md text-lg font-bold text-primary transition-colors leading-tight truncate whitespace-nowrap">Scout</h2>
<p class="font-body-md text-xs text-on-surface-variant mt-0.5 truncate">Assigned field operations</p>
</div>
<div class="w-5 h-5 rounded-full border-2 border-primary bg-primary transition-all flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[12px] text-on-primary font-bold opacity-100 transition-opacity" data-icon="check">check</span>
</div>
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-100 transition-opacity pointer-events-none"></div>
</div>
</label>

<!-- Disabled Other Roles for this context -->
<div class="opacity-30 pointer-events-none grayscale">
    <div class="flex items-center p-sm rounded-xl border border-outline-variant bg-surface-container-low text-left gap-sm">
        <div class="w-12 h-12 rounded-full bg-outline-variant flex items-center justify-center text-on-surface-variant shrink-0">
            <span class="material-symbols-outlined text-[24px]">person</span>
        </div>
        <div class="flex-1 min-w-0">
            <h2 class="font-headline-md text-lg font-bold text-on-surface-variant leading-tight truncate whitespace-nowrap">Other Roles</h2>
            <p class="font-body-md text-xs text-on-surface-variant mt-0.5">Not available for this account</p>
        </div>
    </div>
</div>

</div>
<!-- Information Card -->
<div class="mt-md p-sm rounded-lg bg-surface-container-lowest border border-outline-variant/30 flex items-start gap-sm">
<span class="material-symbols-outlined text-secondary text-[18px] shrink-0 mt-0.5" data-icon="info">info</span>
<p class="font-label-sm text-[11px] text-on-surface-variant leading-relaxed">
        Access granted based on verified credentials. Standard protocols are active for this session.
      </p>
</div>
</main>
<!-- Bottom Navigation / Action Shell -->
<footer class="fixed bottom-0 w-full z-50 bg-surface dark:bg-surface px-lg py-md mb-safe shadow-md rounded-t-xl border-t border-outline-variant/10">
<div class="max-w-lg mx-auto">
<button onclick="if(window.resolveNextTarget){ window.location.href=window.resolveNextTarget(); } else { window.location.href='../../scout/scout_dashboard/scout_today_dashboard/code.html'; }" class="w-full h-12 flex items-center justify-center rounded-full bg-primary text-on-primary font-label-lg text-label-lg transition-all duration-200 inner-glow">
        Enter Dashboard
      </button>
</div>
</footer>
<!-- Background Decorative Element (Subtle Emerald Glow) -->
<div class="fixed top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary/5 blur-[100px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary/5 blur-[120px] rounded-full pointer-events-none -z-10"></div>


    <script src="../../../app_logic.js"></script>
