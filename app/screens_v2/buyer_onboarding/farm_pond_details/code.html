                  "secondary-fixed-dim": "#d0bcff",
                  "on-background": "#e5e2e1",
                  "on-secondary-container": "#c4abff",
                  "background": "#131313",
                  "primary-fixed-dim": "#4edea3",

                  "on-error": "#690005",

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4edea3 !important;
      box-shadow: 0 0 0 1px #4edea3;
    }
    .tactile-button {
      box-shadow: inset 0 0.5px 0 0 rgba(255, 255, 255, 0.1);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md sticky top-0 z-50">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150" data-icon="arrow_back">arrow_back</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">FenBridge</h1>
</div>
<button class="font-label-lg text-label-lg text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">Skip</button>
</header>
<main class="flex-grow px-margin pt-xl pb-32 max-w-lg mx-auto w-full">
<div class="mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Your Pond Details</h2>
<p class="font-body-md text-on-surface-variant">Provide the specifications for your makhana pond to help us calculate accurate market valuations.</p>
</div>
<!-- Featured Visual Card -->
<div class="relative w-full h-48 rounded-xl overflow-hidden mb-xl border border-outline-variant">
<img alt="Makhana Pond View" class="w-full h-full object-cover opacity-60" data-alt="A cinematic overhead shot of a sprawling makhana aquatic farm in Bihar during the golden hour. Large circular green lotus-like leaves float on the calm water surface, reflecting a deep emerald and sunset orange sky. The atmosphere is serene and professional, emphasizing the scale of premium agricultural production with high-contrast shadows and sharp details." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAIKdPyKa4G6j6FSiY5ZJByKC4y1RhcPw-_dgAjKXXOVu7ZxzbtMzHMmKwVaolroL59uqccwH8pTpttcTQBRlIsD8t1elN83sY86pi2QY52k_MWjxStlhKNWJKLTB7lL80Eywh00O1Ivfi0a9rChs7pwv_iFPi6C-qW0-AQIycFfeQsP2Be-DWOKAwY7aK_8upvKdLW4u3BDR6Z2Q5mqvPXO3S6QX7kdd6_huLT9D_dmFkJMOeTzMWvs2CdLmCgfd6_GbxfdIGnMqq"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent opacity-80"></div>
<div class="absolute bottom-md left-md">
<span class="bg-primary/20 text-primary border border-primary/30 px-sm py-xs rounded-full font-label-sm text-label-sm uppercase tracking-wider">Farmer Account</span>
</div>
</div>
<form class="space-y-xl">
<!-- Pond Name Input -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-base" for="pond-name">Pond Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface focus:ring-0 transition-all placeholder:text-outline" id="pond-name" placeholder="e.g. North Wetland Alpha" type="text"/>
<div class="absolute right-md top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline-variant" data-icon="water">water</span>
</div>
</div>
</div>
<!-- Area Row -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-base">Area</label>
<div class="flex gap-gutter">
<div class="flex-grow">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface focus:ring-0 transition-all" placeholder="0.00" type="number"/>
</div>
<div class="w-1/3">
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface focus:ring-0 transition-all appearance-none cursor-pointer">
<option value="acres">acres</option>
<option value="bigha">bigha</option>
<option value="hectares">hectares</option>
</select>
</div>
</div>
</div>
<!-- Capacity Row -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant px-base">Estimated Annual Capacity</label>
<div class="flex gap-gutter items-center">
<div class="relative flex-grow">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-md text-on-surface focus:ring-0 transition-all pr-xl" placeholder="5000" type="number"/>
<div class="absolute right-md top-1/2 -translate-y-1/2">
<span class="font-label-lg text-label-lg text-outline">kg</span>
</div>
</div>
<div class="p-base bg-surface-container-high rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="info">info</span>
</div>
</div>
</div>
<!-- Info Card -->
<div class="bg-surface-container-high border border-outline-variant p-md rounded-xl flex gap-md items-start">
<span class="material-symbols-outlined text-primary-fixed-dim" data-icon="tips_and_updates">tips_and_updates</span>
<p class="font-label-sm text-label-sm text-on-surface-variant">Entering accurate capacity data allows FenBridge to match you with institutional buyers earlier in the harvest cycle.</p>
</div>
</form>
</main>
<!-- Sticky Bottom CTA -->
<footer class="fixed bottom-0 left-0 w-full p-margin bg-surface/80 backdrop-blur-md z-40">
<div class="max-w-lg mx-auto">
<button class="tactile-button w-full bg-primary text-on-primary font-label-lg text-label-lg py-md rounded-xl transition-all hover:opacity-90 active:scale-[0.98] flex justify-center items-center gap-xs">
        Continue
        <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</footer>
<script src="../../../app_logic.js"></script>
</body></html>
