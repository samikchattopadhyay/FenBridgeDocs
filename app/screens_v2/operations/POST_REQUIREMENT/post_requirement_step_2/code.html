<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-headline-md flex justify-between items-center w-full px-margin py-md sticky top-0 z-40">
<div class="flex items-center gap-sm">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-headline-md font-bold">FenBridge</span>
</div>
<button class="font-label-lg text-label-lg text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
      Skip
    </button>
</header>
<main class="flex-1 px-margin py-lg max-w-xl mx-auto w-full pb-32">
<!-- Progress Indicator -->
<div class="mb-xl">
<div class="flex justify-between items-center mb-xs">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-wider">Step 2 of 5</span>
<span class="text-label-sm font-label-sm text-primary">40% Complete</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[40%] rounded-full"></div>
</div>
</div>
<h1 class="font-headline-lg text-headline-lg mb-xl text-on-surface">Set your price and delivery window</h1>
<!-- Section 1: Pricing -->
<section class="mb-xl space-y-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'opsz' 20">payments</span>
<h2 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wide">Ceiling Price</h2>
</div>
<!-- Reference Price Card -->
<div class="bg-surface-container-low border border-outline-variant p-md rounded-xl flex items-start gap-md">
<div class="p-xs bg-primary-container/10 rounded-lg">
<span class="material-symbols-outlined text-primary">trending_up</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant mb-base">Current Market Benchmark</p>
<p class="font-headline-md text-headline-md text-primary">~₹1,000<span class="text-label-lg">/kg for Grade A</span></p>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant block" for="price-input">Your Maximum Bid Price (per kg)</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg">₹</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-lg pl-xl pr-md text-on-surface font-headline-md transition-all outline-none" id="price-input" placeholder="0.00" type="number" value="1050"/>
</div>
</div>
<!-- Calculated Value Bento -->
<div class="grid grid-cols-1 gap-gutter">
<div class="bg-surface-container border border-outline-variant p-md rounded-xl flex justify-between items-center">
<span class="text-on-surface-variant font-body-md">Total Estimated Order Value</span>
<span class="text-headline-md font-headline-md text-on-surface">₹5,25,000</span>
</div>
</div>
</section>
<!-- Section 2: Delivery Window -->
<section class="mb-xl space-y-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'opsz' 20">calendar_today</span>
<h2 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wide">Delivery Window</h2>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant">Earliest Date</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-md text-on-surface transition-all outline-none" type="date"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant">Latest Date</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-md text-on-surface transition-all outline-none" type="date"/>
</div>
</div>
</div>
<div class="flex flex-wrap gap-xs pt-xs">
<button class="px-md py-xs bg-surface-container-highest text-on-surface rounded-full font-label-sm text-label-sm border border-outline-variant hover:border-primary transition-colors">
          Within 2 weeks
        </button>
<button class="px-md py-xs bg-primary/10 text-primary rounded-full font-label-sm text-label-sm border border-primary/30 hover:bg-primary/20 transition-colors">
          Within 1 month
        </button>
</div>
</section>
<!-- Visual Polish: Aesthetic Placeholder Image -->
<div class="rounded-xl overflow-hidden mb-xl aspect-[16/9] relative">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="A macro cinematic shot of premium makhana seeds drying in a modern, high-tech agricultural facility under dramatic warm spotlighting. The background is a sophisticated dark industrial setting with subtle emerald green light accents reflecting off polished surfaces. The overall mood is high-end, reliable, and represents technological advancement in traditional farming practices." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmGAVL_9InUAqZCMweXFc7mNjut9vcoGLSw8pQdV6w4HXsHsA1q3U8xG7nmO31mhg8FSq67uiM8emzx5-inXzooB6uZyMrIWJPjkhYB43ApPuMx7JKam6HJcRu_sSX-mBrK5hXnuNNQ8TvLW5axnNeCLNHyJOnQk8Dnt7MCAenLvQfzmcgv9FkTSk-8CsOvnIXWnUwcod0TnNMQMZjgdX85veuGSYTxjITbB4Rz1xEvGRkB0ifZb-aCd3nFMf0qj1EEwqn1cE0nxM0"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
</main>
<!-- Sticky Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 bg-surface/80 backdrop-blur-md p-margin z-40 border-t border-outline-variant/10">
<div class="max-w-xl mx-auto">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-lg rounded-xl shadow-[0_8px_20px_-4px_rgba(16,185,129,0.3)] hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-xs">
        Continue to Logistics
        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<!-- BottomNavBar (Icons Only) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-lg py-md mb-safe bg-surface shadow-md rounded-t-xl md:hidden">
<div class="flex flex-col items-center justify-center text-outline-variant dark:text-outline-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined">horizontal_rule</span>
</div>
<div class="flex flex-col items-center justify-center text-primary dark:text-primary scale-110 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">horizontal_rule</span>
</div>
</nav>
<script src="../../../../app_logic.js"></script>
</body></html>
