<span class="text-body-lg font-headline-sm text-on-surface">English</span>
<span class="text-label-md font-label-md text-on-surface-variant">English</span>
</div>

</div>

<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary rounded-l-lg"></div>
</label>
<!-- Option 2: Hindi -->
<label class="relative flex items-center justify-between p-4 bg-surface-container-high border border-outline-variant hover:border-outline cursor-pointer group transition-all duration-200 rounded-lg">
