<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface">How much are you listing?</label>
<div class="relative flex items-center">
<input class="w-full bg-[#181818] border border-[#2D2D2D] rounded-lg py-md px-md text-body-lg font-body-lg text-on-surface custom-input-focus placeholder-on-surface-variant/30" placeholder="e.g., 250" type="number"/>
<div class="absolute right-md font-label-lg text-label-lg text-primary bg-primary/10 px-sm py-xs rounded">kg</div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant italic">Enter the quantity you have bagged and ready to dispatch.</p>
</div>
</section>

<section class="space-y-md">
<label class="font-label-lg text-label-lg text-on-surface">Expected quality</label>
<div class="tonal-card p-md rounded-xl flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="bg-primary/10 p-sm rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="search_check" style="font-variation-settings: 'FILL' 0;">search_check</span>
</div>
<div>
<div class="font-label-lg text-label-lg text-on-surface">I'll let the scout assess</div>

</div>
</div>
