<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Component (Mapped from JSON) -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md">
<div class="flex items-center gap-md">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150 flex items-center justify-center">
<span class="material-symbols-outlined text-primary dark:text-primary">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">FenBridge</span>
</div>
<button class="font-label-lg text-label-lg text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
      Skip
    </button>
</header>
<main class="min-h-screen pt-[80px] pb-xl px-margin flex flex-col justify-center">
<!-- Background Hero Visual (Agri-Tech Noir Aesthetic) -->
<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background"></div>
<img class="w-full h-full object-cover grayscale contrast-125" data-alt="A moody, atmospheric wide shot of a makhana cultivation field at dusk, showing the intricate circular leaves on the water's surface. The lighting is low-key with deep shadows and subtle emerald green highlights reflecting off the water, creating a premium agricultural noir aesthetic. The overall composition is cinematic and professional, emphasizing the grit and precision of high-tech farming." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAA9SWlRCL-OoNcPDswYyOG1eXL3hXR31rJ4tr7PcBPagCXXHD2btAsHKPyvZYrjwRQinHQPxfCoY4CW0USyWdZ6yR5tqKEOj_ed4gQnGMmn_K8WKxEsw1YQ9huiXAUvtM0WESm91teE53cXf01_TlruvMi2-lzLX-5kPmDeWupzhpe_SXNn9yhLjmDKF3-vi-U7O-C5JRl2sMhrBgOsxJWq2SAjl9bfw6_XMoWt3IZyGuocaUA_LratF5v6x2XLvRqhY3i01BdcCMd"/>
</div>
<!-- Login Container -->
<div class="max-w-md mx-auto w-full space-y-xl">
<!-- Section Header -->
<div class="space-y-xs">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Scout Login</h1>
<p class="font-body-md text-on-surface-variant">Secure access for FenBridge field operations and procurement specialists.</p>
</div>
<!-- Login Form Card -->
<div class="bg-[#1E1E1E] border border-[#2D2D2D] rounded-xl p-lg shadow-xl">
<form action="#" class="space-y-lg" method="POST">
<!-- ID / Email Input -->
<div class="space-y-xs">
<label class="block font-label-lg text-on-surface" for="scout-id">Employee ID / Email</label>
<div class="relative flex items-center bg-[#181818] border border-[#2D2D2D] rounded-lg input-field-shadow transition-all group">
<span class="material-symbols-outlined absolute left-md text-outline group-focus-within:text-primary">person</span>
<input class="w-full pl-[48px] pr-md py-md bg-transparent border-none text-on-surface placeholder:text-outline-variant focus:ring-0" id="scout-id" name="id" placeholder="e.g. SC-4829 or scout@fenbridge.com" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-lg text-on-surface" for="password">Password</label>
</div>
<div class="relative flex items-center bg-[#181818] border border-[#2D2D2D] rounded-lg input-field-shadow transition-all group">
<span class="material-symbols-outlined absolute left-md text-outline group-focus-within:text-primary">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-md bg-transparent border-none text-on-surface placeholder:text-outline-variant focus:ring-0" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Login Button -->
<button class="w-full bg-[#10B981] text-on-primary h-[56px] rounded-lg font-label-lg text-label-lg flex items-center justify-center gap-xs hover:opacity-90 active:scale-[0.98] transition-all shadow-[inset_0px_1px_0px_rgba(255,255,255,0.1)]" type="submit">
            Login
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Secondary Links -->
<div class="mt-lg flex flex-col items-center gap-md pt-lg border-t border-[#2D2D2D]">
<a class="font-label-lg text-primary hover:underline decoration-primary/30 underline-offset-4 transition-all" href="#">
            Forgot Password
          </a>
<a class="font-label-lg text-on-surface-variant hover:text-on-surface transition-colors" href="#">
            Change Password
          </a>
</div>
</div>
<!-- Footer Compliance / Info -->
<footer class="text-center space-y-sm">
<p class="font-label-sm text-outline-variant uppercase tracking-widest">Authorized Access Only</p>
<div class="flex justify-center gap-lg">
<img class="h-8 grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer" data-alt="A sharp, minimalist corporate logo of a global agricultural standards organization, rendered in a clean flat style. The icon represents stability and trust in the international commodity market. It is set against a dark background to match the high-end agri-tech noir aesthetic of the application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPhGLGWAhYS_5gjIdrGJaZ1yLYCxQPIyWPovx0VhQy48xAoc9V39RwUfH3eJind-JO3hMhsWGsdfUvQq8lMMCaaEsV6V9TsvoOpAjKLjxI81HJifowBg8xQKBm-XaJicOrwG7ZrGzqMKN-u58UfuBzoIQzEzZkmZcojZTlREPhsCLxf18os42mO2zxq3OV1wpC3QIcnph4zn8knwIcSWEFJlQ8CXpL-l1TgacUb8dd_5oJeRoL9zwxEh7tu_NStToXX702VXQZpVc3"/>
<img class="h-8 grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all cursor-pointer" data-alt="A modern, high-tech security certification badge showing a digital shield and checkmark. The design is sleek and minimalist, utilizing clean lines and a deep charcoal gray palette that complements the emerald green primary colors of the UI. It signifies encrypted, high-security login protocols for institutional users." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAf4QizmgzIO8k3_p9cyb7-1LRArlhAEGopay_GS_meLMZXHxrSEaP9RFCgAbjxiGyMMY1ldu_CsY_eArPWrkpGBfCyRtGJWqVPyf3p0nGD4rarGNDpEGiGbrDiXw14dhIQ8p9TzrPFUH-F7kRi0l9q-MaQ0malReAw8Gt9SApPuBRZN0urH72JKDlxapzNLN8xJVDNSfi62b6A0BNWasYFUq3ScBFnCn1dvql-gywdEVaX1DX9x2NGrLtdwuKwRLd3NxxB5otGZbYM"/>
</div>
</footer>
</div>
</main>
<!-- Navigation Shell Logic: Hidden for Transactional/Login Screen as per Mandate -->
<nav class="hidden">
<!-- BottomNavBar is suppressed on focused login screen -->
