<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">

<div class="flex items-center gap-sm">
<button class="text-primary dark:text-primary hover:opacity-80 transition-opacity Active: scale-95 transition-transform duration-150">

</div>
<button class="font-label-lg text-label-lg text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity">Skip</button>

</div>

<button class="p-xs hover:bg-surface-container-highest rounded-full transition-colors">

</button>

<!-- Form Body -->

<label class="font-label-lg text-outline">Address Label</label>

</div>
<!-- Personal Info Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="space-y-xs">
<label class="font-label-lg text-outline">Contact Person</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Full Name" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-outline">Contact Phone</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="+91 00000 00000" type="tel"/>
</div>
</div>

<div class="space-y-lg">
<div class="space-y-xs">
<label class="font-label-lg text-outline">Address Line 1</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Street name, building, floor" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-outline">Address Line 2 (Optional)</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Area, colony, suite" type="text"/>
</div>
</div>
<!-- City, State, Pincode -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-lg">
<div class="space-y-xs">
<label class="font-label-lg text-outline">City</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Patna" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-outline">State</label>
<div class="relative">
<select class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all appearance-none">
<option value="Bihar">Bihar</option>
<option value="UP">Uttar Pradesh</option>
<option value="WB">West Bengal</option>
<option value="MP">Madhya Pradesh</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-outline">Pincode</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" maxlength="6" placeholder="800001" type="text"/>
</div>
</div>
<!-- Landmark -->
<div class="space-y-xs">
<label class="font-label-lg text-outline">Landmark</label>
<input class="w-full bg-[#181818] border border-outline-variant rounded-lg px-md py-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Nearby famous spot" type="text"/>
</div>

<div class="flex items-center justify-between py-md border-t border-outline-variant/20">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<div>
<p class="font-label-lg text-on-surface">Set as primary</p>
<p class="font-label-sm text-outline">Use this for all default shipments</p>

<label class="relative inline-flex items-center cursor-pointer">
