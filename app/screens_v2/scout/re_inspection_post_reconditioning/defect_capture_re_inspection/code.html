                  "on-background": "#e5e2e1",

<style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

        ::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  
        ::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
    
        ::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin h-16 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary cursor-pointer active:opacity-80 active:scale-95 transition-all" data-icon="arrow_back">arrow_back</span>
<h1 class="text-headline-md font-headline-md text-primary font-bold truncate whitespace-nowrap">Defect Capture</h1>
</div>
<div class="flex items-center gap-xs">
<span class="text-label-lg font-label-lg text-on-surface-variant">Step 4 of 6</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</div>
</header>
<!-- Progress Bar (Sub-header) -->
<div class="fixed top-16 left-0 w-full z-40 h-1 bg-surface-container-highest">
<div class="h-full bg-primary-container" style="width: 42%;"></div>
</div><div class="fixed top-[68px] left-0 w-full z-40 bg-secondary-container/20 border-b border-secondary-container/30 h-8 flex items-center px-margin">
<span class="text-secondary-fixed-dim font-label-sm uppercase tracking-widest flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">restart_alt</span>
Re-inspection
</span>
</div>
<main class="flex-1 mb-32 px-margin mt-28">
<section class="py-xl">
<h2 class="text-headline-lg font-headline-lg mb-lg truncate whitespace-nowrap">Any defects in this lot?</h2>
<!-- Global Toggle Card -->
<div class="bg-surface-container-high border border-outline-variant rounded-xl p-md flex items-center justify-between mb-lg shadow-sm">
<div>
<p class="text-body-lg font-body-lg font-semibold">No defects found</p>
<p class="text-label-sm font-label-sm text-on-surface-variant">Quick mark lot as premium quality</p>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-on-primary-container rounded-full ml-auto"></div>
</div>
</div>
<!-- Add Action -->
<button class="w-full h-14 border-2 border-dashed border-outline-variant rounded-xl flex items-center justify-center gap-md text-primary hover:bg-surface-container-low transition-colors mb-xl">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="text-label-lg font-label-lg">Add defect</span>
</button>
<!-- Active Defect List -->
<div class="space-y-md">
<div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden">
<div class="p-md flex items-start gap-md">
<!-- Icon/Indicator -->
<div class="w-12 h-12 rounded-lg bg-error-container/20 flex items-center justify-center text-error">
<span class="material-symbols-outlined text-[28px]" data-icon="bug_report">bug_report</span>
</div>
<div class="flex-1">
<div class="flex items-center justify-between mb-xs">
<span class="text-body-lg font-body-lg font-bold">Infestation</span>
<span class="px-xs py-0.5 bg-error-container text-on-error-container rounded text-label-sm font-bold uppercase tracking-wider">Critical</span>
</div>
<!-- Input Field Row -->
<div class="flex items-end gap-md mt-md">
<div class="flex-1">
<label class="block text-label-sm font-label-sm text-on-surface-variant mb-base">Measured Defect %</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg h-12 px-md text-on-surface focus:border-primary focus:ring-0" placeholder="0.00" type="number"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant">%</span>
</div>
</div>
<div class="flex flex-col items-center gap-1 group cursor-pointer">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest border border-outline-variant flex items-center justify-center text-primary group-active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<span class="text-[10px] font-bold text-primary">REQUIRED</span>
</div>
</div>
</div>
</div>
<!-- Defect Footer Actions -->
<div class="bg-surface-container-low px-md py-sm flex justify-between items-center border-t border-outline-variant">
<span class="text-label-sm font-label-sm text-on-surface-variant italic">ID: DEF-4492-B</span>
<button class="text-label-lg font-label-lg text-error flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]" data-icon="delete">delete</span>
              Remove
            </button>
</div>
</div>
<!-- Secondary Sample Row (Visual Context) -->
<div class="bg-surface-container/50 border border-outline-variant border-dashed rounded-xl p-md flex items-center justify-between opacity-60">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="texture">texture</span>
<span class="text-body-md font-body-md">Dust and Foreign Matter</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="add">add</span>
</div>
</div>
</section>
</main>
<!-- Sticky Footer Section -->
<footer class="fixed bottom-0 left-0 w-full z-50">
<!-- Severity Summary Banner -->
<div class="bg-surface-container-highest/95 backdrop-blur-md px-margin py-md border-t border-outline-variant flex justify-between items-center shadow-lg">
<div class="flex items-center gap-xs">
<span class="text-label-lg font-label-lg text-on-surface">Worst defect:</span>
<div class="flex items-center gap-1 bg-error-container/20 px-sm py-1 rounded-full border border-error/30">
<span class="text-error font-bold text-label-lg">Critical</span>
<span class="w-2 h-2 rounded-full bg-error"></span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="info">info</span>
</div>
<!-- Primary CTA Area -->
<div class="bg-surface px-margin py-lg pb-safe-offset-4">
<button class="w-full h-14 bg-primary text-on-primary font-bold rounded-xl flex items-center justify-center gap-md active:scale-95 transition-transform shadow-md">
<span class="text-label-lg font-label-lg uppercase tracking-widest">Continue</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Bottom Nav Anchor (Suppressed based on Transactional Rule but placeholder for layout integrity if needed) -->
