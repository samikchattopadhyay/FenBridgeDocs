            "secondary-container": "#571bc1",
            "on-tertiary-fixed-variant": "#842225",
            "on-primary-fixed": "#002113",

            "surface-tint": "#4edea3"

          "borderRadius": {

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar from JSON -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md fixed top-0 z-50">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary dark:text-primary hover:opacity-80 transition-opacity Active: scale-95 transition-transform duration-150" data-icon="arrow_back">arrow_back</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">FenBridge</h1>
</div>
<button class="font-label-lg text-label-lg text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity Active: scale-95 transition-transform duration-150">Skip</button>
</header>
<main class="flex-grow pt-[80px] pb-xl px-margin max-w-2xl mx-auto w-full">
<!-- Profile Header Section -->
<section class="flex flex-col items-center mb-xl">
<div class="relative w-24 h-24 mb-md">
<div class="w-full h-full rounded-full border-2 border-outline-variant overflow-hidden bg-surface-container-high">
<img class="w-full h-full object-cover grayscale contrast-125 opacity-80" data-alt="A professional close-up portrait of a male agricultural scout in a high-tech dark mode aesthetic. He is wearing a minimalist dark utility vest, standing in front of a subtly blurred field of makhana plants at dusk. The lighting is cinematic with sharp emerald green highlights on his face and clothing, reflecting a sophisticated Agri-Tech Noir environment. The overall mood is focused, reliable, and technologically advanced." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMb70_3_kHhvjMEEq3lap3URAasXl-fXNfAfzcYOFPPeI7Jyr9HLBWWMBvHDZ31GRGm0iLWNQUDWjTEsJjXIrNAJDr4am717FrusgZjNepVqWX6cDHZvmQjTo_U9C1FXC__gR52UXl6isMF5lFy_IvBRRR3eZqvlXPNOQGb8N3Tytgqp1cQ8ZIH78eGUeiL-D6H3lZNkvTCnqAmRYz0PRg3VL8X-xhxJC3Y8ds92wUQL335yfp5BaGMOQt1G-Cu5hr7z9VzV4fQyG-"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">Edit Profile</h2>
<p class="font-body-md text-on-surface-variant">Manage your scout credentials</p>
</section>
<!-- Form Section -->
<form class="space-y-lg">
<!-- Full Name -->
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs group-focus-within:text-primary transition-colors">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-md text-on-surface focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all font-body-md" type="text" value="Arjun Deshmukh"/>
</div>
<!-- Email (Read Only) -->
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Email Address (Verified)</label>
<div class="flex items-center gap-sm w-full bg-surface-container border border-outline-variant/30 rounded-xl px-md py-md text-on-surface-variant/70 font-body-md opacity-80 cursor-not-allowed">
<span class="material-symbols-outlined text-[20px]" data-icon="lock_person">lock_person</span>
<span>arjun.scout@fenbridge.agri</span>
</div>
</div>
<!-- Mobile Number -->
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs group-focus-within:text-primary transition-colors">Mobile Number</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-label-lg">+91</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl pl-[52px] pr-md py-md text-on-surface focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all font-body-md" type="tel" value="98765 43210"/>
</div>
</div>
<!-- Assigned District (Read Only) -->
<div class="group">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Assigned District</label>
<div class="flex items-center justify-between w-full bg-surface-container border border-outline-variant/30 rounded-xl px-md py-md text-on-surface-variant/70 font-body-md opacity-80 cursor-not-allowed">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-[20px]" data-icon="location_on">location_on</span>
<span>Darbhanga, Bihar</span>
</div>
<span class="font-label-sm bg-outline-variant/20 px-xs py-1 rounded text-outline-variant uppercase">Fixed</span>
</div>
</div>
<!-- Change Password Link -->
<div class="pt-sm">
<button class="flex items-center gap-sm text-primary font-label-lg hover:underline transition-all" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="key">key</span>
<span>Change Account Password</span>
</button>
</div>
<!-- Submit Section -->
<div class="pt-xl">
<button class="w-full bg-primary-container text-on-primary-container font-label-lg py-md rounded-xl shadow-[0_4px_16px_rgba(16,185,129,0.2)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
          Save Changes
        </button>
<p class="text-center font-label-sm text-on-surface-variant mt-md">Last updated 12 days ago</p>
</div>
</form>
</main>
<!-- Navigation Shell Logic: Hidden for task-focused sub-page -->
<!-- "Change Password" Sheet Simulation (Hidden by default, shown here as a concept layer) -->
<div class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] flex items-end justify-center pointer-events-none opacity-0">
<div class="bg-surface-container-high w-full max-w-md rounded-t-3xl p-xl translate-y-full transition-transform border-t border-outline-variant">
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-xl"></div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-md">Update Password</h3>
<div class="space-y-md">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-md" placeholder="Current Password" type="password"/>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-md py-md" placeholder="New Password" type="password"/>
<button class="w-full bg-primary text-on-primary py-md rounded-xl font-label-lg">Confirm New Password</button>
</div>
</div>
</div>
</body></html>
