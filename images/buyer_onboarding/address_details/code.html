<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        theme: {
          extend: {

                    "on-tertiary-container": "#711419",

                    "inverse-primary": "#006c49",
                    "surface-variant": "#353534",
                    "secondary-container": "#571bc1",
                    "inverse-on-surface": "#313030",
                    "primary-fixed": "#6ffbbe",
                    "on-secondary-fixed": "#23005c",
                    "secondary-fixed-dim": "#d0bcff",
                    "on-background": "#e5e2e1",
                    "on-secondary-container": "#c4abff",
                    "background": "#131313",
                    "primary-fixed-dim": "#4edea3",
                    "on-tertiary-fixed": "#410005",
                    "on-error": "#690005",
                    "on-primary-container": "#00422b",
                    "surface": "#131313",
                    "surface-container-highest": "#353534",
                    "outline": "#86948a",
                    "on-primary-fixed-variant": "#005236",
                    "surface-container-lowest": "#0e0e0e",
                    "primary": "#4edea3",
                    "surface-container": "#201f1f",
                    "tertiary-container": "#fc7c78",
                    "secondary": "#d0bcff",
                    "surface-container-high": "#2a2a2a",
                    "on-surface": "#e5e2e1",
                    "on-secondary-fixed-variant": "#5516be",
                    "outline-variant": "#3c4a42",
                    "on-tertiary-fixed-variant": "#842225",
                    "surface-container-low": "#1c1b1b",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed": "#ffdad7",
                    "tertiary": "#ffb3af",
                    "secondary-fixed": "#e9ddff",
                    "surface-bright": "#393939",
                    "error": "#ffb4ab",
                    "on-secondary": "#3c0091",
                    "on-primary-fixed": "#002113",
                    "tertiary-fixed-dim": "#ffb3af",
                    "inverse-surface": "#e5e2e1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "md": "16px",
                    "gutter": "12px",
                    "margin": "20px",
                    "base": "4px",
                    "sm": "12px",
                    "xs": "8px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-lg": ["Hanken Grotesk"],
                    "label-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-lg": ["Inter"],
                    "headline-md": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #121212;
            color: #e5e2e1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md docked full-width top-0 z-50">
<div class="flex items-center gap-md">
<button class="hover:opacity-80 transition-opacity flex items-center justify-center w-12 h-12">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">FenBridge</h1>
</div>
<button class="font-label-lg text-label-lg text-on-surface-variant hover:opacity-80 transition-opacity">Skip</button>
</header>
<main class="flex-grow flex flex-col px-margin pt-xl pb-32">
<!-- Progress Indicator -->
<div class="flex gap-xs mb-xl">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-outline-variant rounded-full"></div>
</div>
<section class="mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Where are you located?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Provide your location details to find the best market rates and buyers in your region.</p>
</section>
<!-- Bento Layout for Form Sections -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Farmer Location Section -->
<div class="bg-surface-container-low border border-outline-variant rounded-xl p-md flex flex-col gap-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="agriculture">agriculture</span>
<h3 class="font-label-lg text-label-lg uppercase tracking-wider text-primary">Farmer Details</h3>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-base">District</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-lg px-md text-on-surface appearance-none focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all">
<option disabled="" selected="" value="">Select District</option>
<option value="madhubani">Madhubani</option>
<option value="darbhanga">Darbhanga</option>
<option value="purnia">Purnia</option>
<option value="katihar">Katihar</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-base">Panchayat/Village</label>
<input class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-lg px-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Enter your village name" type="text"/>
</div>
</div>
<!-- Buyer Location Section -->
<div class="bg-surface-container-low border border-outline-variant rounded-xl p-md flex flex-col gap-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary" data-icon="storefront">storefront</span>
<h3 class="font-label-lg text-label-lg uppercase tracking-wider text-secondary">Buyer Details</h3>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-base">Delivery City</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-highest border border-outline-variant rounded-lg px-md text-on-surface appearance-none focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all">
<option disabled="" selected="" value="">Select City</option>
<option value="patna">Patna</option>
<option value="delhi">New Delhi</option>
<option value="mumbai">Mumbai</option>
<option value="kolkata">Kolkata</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-base">Full Address</label>
<textarea class="w-full bg-surface-container-highest border border-outline-variant rounded-lg p-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all resize-none" placeholder="Enter complete warehouse or office address" rows="3"></textarea>
</div>
</div>
<!-- Map Visualization (Aesthetic Anchor) -->
<div class="md:col-span-2 relative h-48 rounded-xl overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover opacity-60" data-alt="A stylized dark mode map visualization of a rural agricultural region. The map features deep charcoal terrain with glowing emerald green nodes and interconnecting lines representing supply chain routes. The aesthetic is clean and high-tech, with a subtle grainy texture and soft atmospheric lighting, emphasizing a modern data-driven marketplace atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuArOQPYP2OtJZgdh7FQaeYB6AHGCk8dH0N-NG5AcaYzpo6QA2ysV80trzXfQHuNJKZUGLzz_b55_3XZdnsRVBJYVTB8iyE10j1JgYMbt4M2g7wg2eHgJrknr8Cy2-aVWPTgEQnRT2hRcGhXiqN3LxjgfIH_wy6z5mR8RMDn83N7WqvH2dxuhVqUIOGJr8dMIJw7g_wPQou-duyM8HwLUlTojwA3GhZB5s5Bwiqk9Mh38-RXCv1zHGWzLYpTP6cQNeSYXAMXKKcpZhbE"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
<div class="absolute bottom-md left-md flex items-center gap-xs bg-surface/80 backdrop-blur-md px-sm py-xs rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="location_on">location_on</span>
<span class="font-label-sm text-label-sm text-on-surface">Auto-detecting region...</span>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Area (Shell) -->
<footer class="fixed bottom-0 w-full z-50 flex flex-col items-center">
<!-- Floating Action Section -->
<div class="w-full px-margin pb-xl pt-md bg-gradient-to-t from-surface via-surface to-transparent">
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-sm active:scale-95 transition-transform duration-150 shadow-lg shadow-primary/20">
                Continue
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- BottomNavBar (Shared Component) -->
<nav class="bg-surface dark:bg-surface fixed bottom-0 w-full z-50 flex justify-around items-center px-lg py-md mb-safe rounded-t-xl shadow-md">
<a class="flex flex-col items-center justify-center text-outline-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-all" href="#">
<span class="material-symbols-outlined" data-icon="horizontal_rule">horizontal_rule</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary scale-110 active:scale-98 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="horizontal_rule" data-weight="fill" style="font-variation-settings: 'FILL' 1;">horizontal_rule</span>
</a>
</nav>
</footer>
</body></html>
