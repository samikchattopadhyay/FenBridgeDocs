<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FenBridge - Select Language</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

        }
        body {
            background-color: #131313;
            color: #e5e2e1;
        }
    </style>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-container": "#fc7c78",

                      "secondary-fixed-dim": "#d0bcff",
                      "outline-variant": "#3c4a42",
                      "surface-container-high": "#2a2a2a",
                      "secondary-container": "#571bc1",
                      "on-tertiary-fixed": "#410005",
                      "error-container": "#93000a",
                      "tertiary-fixed-dim": "#ffb3af",
                      "secondary-fixed": "#e9ddff",
                      "primary-container": "#10b981",
                      "on-error-container": "#ffdad6",
                      "surface": "#131313",
                      "error": "#ffb4ab",
                      "on-primary-container": "#00422b",
                      "on-surface-variant": "#bbcabf",
                      "tertiary": "#ffb3af",
                      "surface-container": "#201f1f",
                      "surface-tint": "#4edea3",
                      "on-primary-fixed-variant": "#005236",

                      "tertiary-fixed": "#ffdad7",
                      "on-secondary": "#3c0091",
                      "background": "#131313",
                      "primary-fixed-dim": "#4edea3",
                      "outline": "#86948a",
                      "surface-container-low": "#1c1b1b",
                      "surface-container-highest": "#353534",
                      "on-tertiary-container": "#711419",
                      "on-primary": "#003824",
                      "on-secondary-container": "#c4abff",
                      "on-primary-fixed": "#002113",
                      "secondary": "#d0bcff",
                      "on-surface": "#e5e2e1",
                      "on-error": "#690005",
                      "inverse-surface": "#e5e2e1",

              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xl": "32px",
                      "xs": "8px",
                      "md": "16px",
                      "margin": "20px",
                      "gutter": "12px",
                      "sm": "12px",
                      "lg": "24px",
                      "base": "4px"
              },
              "fontFamily": {
                      "headline-lg": ["Hanken Grotesk"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Hanken Grotesk"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background flex flex-col min-h-screen">
<!-- Top Navigation Bar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md fixed top-0 z-50">
<div class="flex items-center gap-xs w-8">
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">FenBridge</h1>
<button class="font-label-lg text-label-lg text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">Skip</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin pt-[80px] pb-xl">

<!-- Typography Section -->
<div class="text-center mb-xl">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Choose Your Language</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select your preferred language to continue in the app.</p>
</div>
<!-- Language Options List -->
<div class="space-y-md">
<!-- English - Active State -->
<label class="block relative group cursor-pointer">
<input checked="" class="hidden peer" name="language" type="radio" value="english"/>
<div class="flex items-center justify-between p-lg bg-surface-container-low border border-outline-variant rounded-xl transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-high peer-checked:shadow-[0_0_12px_rgba(16,185,129,0.15)] group-hover:border-primary/50">
<div class="flex items-center gap-md">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-variant text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container">
<span class="font-label-lg">EN</span>
</div>
<span class="font-headline-md text-on-surface">English</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Hindi -->
<label class="block relative group cursor-pointer">
<input class="hidden peer" name="language" type="radio" value="hindi"/>
<div class="flex items-center justify-between p-lg bg-surface-container-low border border-outline-variant rounded-xl transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-high peer-checked:shadow-[0_0_12px_rgba(16,185,129,0.15)] group-hover:border-primary/50">
<div class="flex items-center gap-md">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-variant text-on-surface-variant">
<span class="font-label-lg">HI</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-on-surface">Hindi</span>
<span class="font-label-sm text-on-surface-variant">हिन्दी</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Bengali -->
<label class="block relative group cursor-pointer">
<input class="hidden peer" name="language" type="radio" value="bengali"/>
<div class="flex items-center justify-between p-lg bg-surface-container-low border border-outline-variant rounded-xl transition-all duration-200 peer-checked:border-primary peer-checked:bg-surface-container-high peer-checked:shadow-[0_0_12px_rgba(16,185,129,0.15)] group-hover:border-primary/50">
<div class="flex items-center gap-md">
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-variant text-on-surface-variant">
<span class="font-label-lg">BN</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-on-surface">Bengali</span>
<span class="font-label-sm text-on-surface-variant">বাংলা</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
</div>
</main>
<!-- Bottom Action Button Container -->
<div class="sticky bottom-0 bg-background/80 backdrop-blur-md px-margin py-lg pt-base border-t border-outline-variant/30">
<button class="w-full h-[56px] bg-primary text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-xs shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200 hover:brightness-110">
            Continue
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="h-safe"></div>
</div>
<script src="../../../app_logic.js"></script>
</body></html>
