<!-- OTP Input Section -->
<div class="grid grid-cols-5 gap-sm sm:gap-md mb-lg">
<input class="w-full h-16 bg-[#181818] border border-outline-variant rounded-lg text-center font-headline-md text-primary otp-glow focus:border-primary transition-all duration-200" maxlength="1" type="text" value="4"/>
<input class="w-full h-16 bg-[#181818] border border-outline-variant rounded-lg text-center font-headline-md text-primary otp-glow focus:border-primary transition-all duration-200" maxlength="1" placeholder="·" type="text"/>
<input class="w-full h-16 bg-[#181818] border border-outline-variant rounded-lg text-center font-headline-md text-primary otp-glow focus:border-primary transition-all duration-200" maxlength="1" placeholder="·" type="text"/>
<input class="w-full h-16 bg-[#181818] border border-outline-variant rounded-lg text-center font-headline-md text-primary otp-glow focus:border-primary transition-all duration-200" maxlength="1" placeholder="·" type="text"/>

<!-- Resend Action -->
<div class="flex justify-center mb-xl" id="resend-container">
<button id="resend-btn" class="flex items-center gap-xs font-label-lg text-outline cursor-not-allowed transition-all select-none" disabled>
<span class="material-symbols-outlined text-[18px] animate-spin hidden" id="resend-spinner" data-icon="refresh">refresh</span>
<span id="resend-text">Resend Code in 30s</span>
</button>
<script>
  (function() {
    const btn = document.getElementById('resend-btn');
    const txt = document.getElementById('resend-text');
    const spinner = document.getElementById('resend-spinner');
    if (!btn || !txt) return;
    
    function startTimer() {
      let timeLeft = 30;
      btn.disabled = true;
      btn.className = "flex items-center gap-xs font-label-lg text-outline cursor-not-allowed transition-all select-none";
      if (spinner) spinner.classList.add('hidden');
      txt.textContent = `Resend Code in ${timeLeft}s`;
      
      const interval = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          txt.textContent = `Resend Code in ${timeLeft}s`;
        } else {
          clearInterval(interval);
          btn.disabled = false;
          btn.className = "flex items-center gap-xs font-label-lg text-primary hover:opacity-80 transition-opacity cursor-pointer select-none";
          if (spinner) spinner.classList.remove('hidden');
          txt.textContent = "Resend Code";
        }
      }, 1000);
    }
    
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (!btn.disabled) {
        startTimer();
      }
    });
    
    startTimer();
  })();
</script>
