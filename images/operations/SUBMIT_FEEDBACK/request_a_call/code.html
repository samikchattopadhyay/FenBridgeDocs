<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-surface-variant": "#bbcabf",
                  "on-tertiary-fixed": "#410005",
                  "on-surface": "#e5e2e1",
                  "outline": "#86948a",
                  "surface-container-low": "#1c1b1b",
                  "surface": "#131313",
                  "secondary": "#d0bcff",
                  "error": "#ffb4ab",
                  "surface-container": "#201f1f",
                  "on-tertiary": "#650911",
                  "on-secondary-container": "#c4abff",
                  "on-tertiary-container": "#711419",
                  "surface-tint": "#4edea3",
                  "secondary-fixed": "#e9ddff",
                  "primary-container": "#10b981",
                  "surface-container-high": "#2a2a2a",
                  "on-background": "#e5e2e1",
                  "on-secondary": "#3c0091",
                  "inverse-primary": "#006c49",
                  "secondary-fixed-dim": "#d0bcff",
                  "surface-variant": "#353534",
                  "on-primary": "#003824",
                  "background": "#131313",
                  "on-secondary-fixed": "#23005c",
                  "tertiary": "#ffb3af",
                  "primary": "#4edea3",
                  "on-primary-container": "#00422b",
                  "primary-fixed": "#6ffbbe",
                  "primary-fixed-dim": "#4edea3",
                  "tertiary-container": "#fc7c78",
                  "outline-variant": "#3c4a42",
                  "surface-dim": "#131313",
                  "on-error": "#690005",
                  "surface-container-highest": "#353534",
                  "on-error-container": "#ffdad6",
                  "secondary-container": "#571bc1",
                  "on-primary-fixed-variant": "#005236",
                  "on-primary-fixed": "#002113",
                  "inverse-surface": "#e5e2e1",
                  "tertiary-fixed-dim": "#ffb3af",
                  "on-tertiary-fixed-variant": "#842225",
                  "inverse-on-surface": "#313030",
                  "surface-container-lowest": "#0e0e0e",
                  "on-secondary-fixed-variant": "#5516be",
                  "error-container": "#93000a",
                  "tertiary-fixed": "#ffdad7",
                  "surface-bright": "#393939"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "xl": "32px",
                  "md": "16px",
                  "margin": "20px",
                  "lg": "24px",
                  "xs": "8px",
                  "base": "4px",
                  "sm": "12px",
                  "gutter": "12px"
          },
          "fontFamily": {
                  "body-lg": ["Inter"],
                  "headline-lg": ["Hanken Grotesk"],
                  "headline-md": ["Hanken Grotesk"],
                  "label-sm": ["Inter"],
                  "label-lg": ["Inter"],
                  "body-md": ["Inter"]
          },
          "fontSize": {
                  "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                  "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                  "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                  "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],

      },

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #131313;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3c4a42;
      border-radius: 10px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center justify-end">
<!-- Background Content (Simulating the screen behind the modal) -->
<div class="fixed inset-0 z-0 overflow-hidden px-margin py-xl flex flex-col gap-lg opacity-40 grayscale">
<header class="flex justify-between items-center">
<div class="font-headline-md text-headline-md font-bold text-primary">FenBridge</div>
<span class="material-symbols-outlined text-on-surface">notifications</span>
</header>
<div class="bg-surface-container border border-outline-variant p-md rounded-xl">
<div class="flex items-center gap-sm mb-sm">
<span class="material-symbols-outlined text-tertiary">warning</span>
<h2 class="font-headline-md text-headline-md">Feedback Received</h2>
</div>
<p class="text-on-surface-variant font-body-md">Your rating of 2/5 has been recorded. We strive for excellence in every makhana trade.</p>
</div>
<div class="grid grid-cols-1 gap-md">
<div class="h-32 bg-surface-container rounded-xl border border-outline-variant"></div>
<div class="h-32 bg-surface-container rounded-xl border border-outline-variant"></div>
</div>
</div>
<!-- Backdrop -->
<div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-10"></div>
<!-- Bottom Sheet Modal -->
<div class="relative z-20 w-full max-w-lg bg-surface-container-high rounded-t-xl shadow-2xl border-t border-outline-variant transition-transform transform translate-y-0">
<!-- Drag Handle -->
<div class="flex justify-center py-xs">
<div class="w-10 h-1 bg-outline-variant rounded-full"></div>
</div>
<!-- Content Wrapper -->
<div class="px-margin pt-md pb-xl flex flex-col gap-lg overflow-y-auto max-h-[751px] custom-scrollbar">
<!-- Header -->
<div class="flex flex-col gap-xs">
<div class="flex items-center gap-sm">
<div class="bg-tertiary-container/20 p-xs rounded-lg">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">support_agent</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Request a call from BM</h1>
</div>
<p class="text-on-surface-variant font-body-md">
          We'll have a senior team member call you within 24 hours to understand and resolve your concerns.
        </p>
</div>
<!-- Preferred Time Slot Selection -->
<div class="flex flex-col gap-md">
<label class="font-label-lg text-label-lg text-primary uppercase tracking-wider">Preferred time slot</label>
<div class="grid grid-cols-1 gap-sm">
<!-- Radio Option: Morning -->
<label class="group flex items-center justify-between p-md bg-surface-container-highest border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">light_mode</span>
<span class="font-body-md text-on-surface">Morning</span>
</div>
<input class="w-5 h-5 text-primary bg-surface border-outline-variant focus:ring-primary focus:ring-offset-0" name="time_slot" type="radio" value="morning"/>
</label>
<!-- Radio Option: Afternoon -->
<label class="group flex items-center justify-between p-md bg-surface-container-highest border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">wb_sunny</span>
<span class="font-body-md text-on-surface">Afternoon</span>
</div>
<input class="w-5 h-5 text-primary bg-surface border-outline-variant focus:ring-primary focus:ring-offset-0" name="time_slot" type="radio" value="afternoon"/>
</label>
<!-- Radio Option: Evening -->
<label class="group flex items-center justify-between p-md bg-surface-container-highest border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">dark_mode</span>
<span class="font-body-md text-on-surface">Evening</span>
</div>
<input class="w-5 h-5 text-primary bg-surface border-outline-variant focus:ring-primary focus:ring-offset-0" name="time_slot" type="radio" value="evening"/>
</label>
<!-- Radio Option: Any Time -->
<label class="group flex items-center justify-between p-md bg-surface-container-highest border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">schedule</span>
<span class="font-body-md text-on-surface">Any time</span>
</div>
<input checked="" class="w-5 h-5 text-primary bg-surface border-outline-variant focus:ring-primary focus:ring-offset-0" name="time_slot" type="radio" value="anytime"/>
</label>
</div>
</div>
<!-- Text Area -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-end">
<label class="font-label-lg text-label-lg text-primary uppercase tracking-wider" for="details">Anything specific you'd like to discuss?</label>
<span class="font-label-sm text-label-sm text-on-surface-variant">(Optional)</span>
</div>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md" id="details" placeholder="Explain the issue with your recent transaction..." rows="3"></textarea>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm pt-sm">
<button class="w-full h-[52px] bg-primary text-on-primary font-label-lg text-label-lg rounded-xl shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">call</span>
          Request Call
        </button>
<button class="w-full h-[52px] bg-transparent border border-outline-variant text-on-surface font-label-lg text-label-lg rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all">
          Cancel
        </button>
</div>
</div>
</div>
</body></html>
