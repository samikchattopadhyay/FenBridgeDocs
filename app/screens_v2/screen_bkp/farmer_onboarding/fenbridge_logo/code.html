<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FenBridge — Loading Core Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0c;
            font-family: 'Inter', sans-serif;
        }
        .splash-logo {
            animation: pulseGlow 2.5s infinite alternate, floatAnim 4s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.2)); }
            to { filter: drop-shadow(0 0 35px rgba(16, 185, 129, 0.6)); }
        }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.02); }
        }
        .progress-bar-fill {
            animation: loadProgress 4.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes loadProgress {
            0% { width: 0%; }
            20% { width: 35%; }
            60% { width: 75%; }
            100% { width: 100%; }
        }
    
        ::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-gray-100 overflow-hidden relative antialiased">
    
    <!-- Ambient Lighting Background Flares -->
    <div class="absolute w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Center Stage Anchor -->
    <div class="relative z-10 flex flex-col items-center">
        <!-- High-Fidelity Animated SVG Icon -->
        <div class="splash-logo mb-6">
            <svg width="110" height="110" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="100" height="100" rx="28" fill="#10B981"/>
              <path d="M30 70V30H45C53.2843 30 60 36.7157 60 45C60 53.2843 53.2843 60 45 60H35V70H30ZM35 55H45C50.5228 55 55 50.5228 55 45C55 39.4772 50.5228 35 45 35H35V55Z" fill="white"/>
              <circle cx="70" cy="70" r="15" fill="white" fill-opacity="0.25"/>
              <path d="M65 70C65 67.2386 67.2386 65 70 65C72.7614 65 75 67.2386 75 70C75 72.7614 72.7614 75 70 75C67.2386 75 65 72.7614 65 70Z" fill="white"/>
            </svg>
        </div>

        <!-- Corporate Branding -->
        <h1 class="text-3xl font-bold tracking-tight text-white font-['Hanken_Grotesk'] flex items-center gap-1 mb-1 truncate whitespace-nowrap">
            FenBridge
        </h1>
        <p class="text-xs font-medium text-emerald-400/80 tracking-widest uppercase mb-10">
            Secure Agritech Infrastructure
        </p>

        <!-- Dynamic Loader Bar -->
        <div class="w-48 h-1 bg-gray-800 rounded-full overflow-hidden relative">
            <div class="progress-bar-fill h-full bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full"></div>
        </div>
    </div>

    <!-- Automatic Redirection Timer logic -->
    <script>
        // Report state to live preview simulator trace monitoring console
        if (window.parent && window.parent.postMessage) {
            window.parent.postMessage({
                type: "SCREEN_LOADED",
                folder: "Splash Screen",
                path: window.location.pathname
            }, "*");
        }

        // Auto load Welcome screen precisely after 5 seconds
        setTimeout(() => {
            window.location.href = "../welcome_to_fenbridge/code.html";
        }, 5000);
    </script>


    <script src="../../../../app_logic.js"></script>
</body>
</html>
