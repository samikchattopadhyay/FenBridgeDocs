            "tertiary-fixed": "#ffdad7",
            "on-secondary": "#003829",
            "on-surface-variant": "#bbcabf",
            "tertiary-fixed-dim": "#ffb3af",
            "on-primary": "#003824",
            "tertiary-container": "#ffb3af",

            "gutter": "16px",
            "margin-mobile": "16px",
            "base-unit": "4px",
            "container-max": "1440px"

          "fontFamily": {
            "body-lg": ["Hanken Grotesk"],

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .tonal-gradient {
      background: radial-gradient(circle at top, rgba(111, 251, 190, 0.08) 0%, transparent 70%);
    }
    ::-webkit-scrollbar { display: none !important; }
    * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
  <!-- Top App Bar -->
  <header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-background/80 backdrop-blur-md border-b border-outline-variant/30">
    <span class="text-headline-md font-headline-md font-bold tracking-tight text-primary">FenBridge</span>
    <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary active:scale-95 transition-transform">
      <span class="material-symbols-outlined">account_circle</span>
    </button>
  </header>

  <!-- Main Canvas -->
  <main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-16 pb-32 tonal-gradient">
    <!-- Illustration Section -->
    <div class="relative mb-8 flex items-center justify-center">
      <div class="absolute w-48 h-48 bg-primary/10 blur-3xl rounded-full"></div>
      <div class="relative z-10 w-60 h-60 flex items-center justify-center bg-surface-container rounded-full border border-outline-variant/20 shadow-lg">
        <img alt="Success Illustration" class="w-36 h-36 opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYi9FEnSyyHZp6TmyZAQwXomJZtBHPNA6_laqEHnQpefSXS9X3-9gSKPqx5OLdcEbmdNHPSd1mDpqymOCKcBAa1BlILFrliof9LpFY7Aso2KkNbGMPsiM9qzgilBuIUED90h1jd0zCkfLRZHs78RkCpntm_FaMrxZmut5O6Xr6YIPf84ZbuEjneTGCk50WhdhznBYeLm6pj69EI6g1msMEPy57LaOqe0-khezaeSjDxyD_HWpGh8SLhBTtXi-41t2S-dPCGwD8E3L0"/>
      </div>
    </div>

    <!-- Feedback Content -->
    <div class="text-center space-y-4 max-w-xs mb-8">
      <h1 class="text-headline-md font-bold text-on-background">Popper Registration Submitted</h1>
      <div class="flex flex-col items-center gap-2">
        <!-- Verdict Chip -->
        <div class="inline-flex items-center px-4 py-1 rounded-full bg-primary-container/20 border border-primary/30">
          <span class="text-primary font-bold text-xs uppercase tracking-wider">Status: Pending Sync</span>
        </div>
        <!-- Status Details -->
        <div class="space-y-1">
          <p class="text-body-md text-on-surface-variant flex items-center justify-center gap-2">
            <span class="text-sm">⏳</span> Queued to offline sync
          </p>
          <p class="text-xs text-outline uppercase tracking-wider">Corporate details locked & verified</p>
        </div>
      </div>
    </div>

    <!-- Action Area -->
    <div class="w-full max-w-sm flex flex-col gap-3">
      <button onclick="window.location.href='../../scout_dashboard/scout_today_dashboard/code.html'" class="w-full h-14 bg-primary text-on-primary rounded-full font-bold text-headline-sm shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center">
        Back to Today's Dashboard
      </button>
    </div>
  </main>

  <script src="../../../../app_logic.js"></script>
</body>
</html>
