    }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary selection:text-on-primary">
<!-- Top Navigation Bar -->
<header class="bg-surface sticky top-0 z-40 flex justify-between items-center w-full px-margin py-md">
<div class="flex items-center gap-sm">
<button class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Mark Lot Ready</h1>
</div>
<div class="flex flex-col items-end">
<span class="font-label-lg text-label-lg text-on-surface-variant">Step 3 of 4</span>
<div class="w-24 h-1.5 bg-surface-variant rounded-full mt-xs overflow-hidden">
<div class="h-full bg-primary-container w-3/4"></div>
</div>
</div>
</header>
<main class="flex-grow px-margin pt-xl pb-32">
<!-- Progress Helper -->
<section class="mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Add photos of the lot</h2>
<p class="font-body-md text-on-surface-variant">Upload at least 2 photos showing the bagged lot and location.</p>
</section>
<!-- Upload Actions -->
<div class="grid grid-cols-2 gap-sm mb-xl">
<button class="flex flex-col items-center justify-center gap-xs py-xl rounded-xl bg-surface-container-high border-2 border-dashed border-outline-variant hover:border-primary transition-colors active:scale-98">
<span class="material-symbols-outlined text-primary text-3xl">photo_camera</span>
<span class="font-label-lg text-label-lg text-on-surface">Take photo</span>
</button>
<button class="flex flex-col items-center justify-center gap-xs py-xl rounded-xl bg-surface-container-high border-2 border-dashed border-outline-variant hover:border-primary transition-colors active:scale-98">
<span class="material-symbols-outlined text-primary text-3xl">image</span>
<span class="font-label-lg text-label-lg text-on-surface">Choose from gallery</span>
</button>
</div>
<!-- Photo Status -->
<div class="flex justify-between items-center mb-md">
<span class="font-label-lg text-label-lg text-on-surface">Uploaded: 3 of 5</span>
<span class="flex items-center gap-xs text-primary font-label-sm text-label-sm">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        Minimum requirement met
      </span>
</div>
<!-- Photo Grid (Bento Style) -->
<div class="grid grid-cols-6 grid-rows-2 gap-sm h-80">
<!-- Main Photo -->
<div class="col-span-4 row-span-2 relative rounded-xl overflow-hidden bg-surface-container-low group">
<img class="w-full h-full object-cover" data-alt="A professional high-angle close-up shot of several large white woven bags filled with makhana seeds sitting on a clean concrete floor in a modern warehouse setting. The lighting is crisp and moody with deep shadows, emphasizing the emerald green agri-tech branding. The atmosphere is industrial and high-end, showcasing agricultural logistics in a premium dark-mode aesthetic with vibrant green highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcKgu_FlQZyppcwTb685lXV9UbDTBuUnMSsfMgZYSFPnZ6SFZF9rJkiU0t1GjJh0W11cll3zYK3Wsj-LjKWgEa4o_A9p5M6DxgNBG2kuyoHhqHfQMnXu-fjrBoavTnBkaseYc5njtxaRqbOWMzNtmNJ-I-7Xsqn9NlkVL8hBynt60FJRf-HJgu3BcX330r4xbCfhBqtwhnW7Xq3N3JO0E2kE6f-mYsSLNE0rCMPOnAs9XocD7c4TEykc0kmU9Ra0X_tYdFpmUDmm2X"/>
<button class="absolute top-sm right-sm bg-error/20 backdrop-blur-md p-xs rounded-full text-error hover:bg-error/40 transition-colors">
<span class="material-symbols-outlined text-sm">delete</span>
</button>
</div>
<!-- Thumbnails -->
<div class="col-span-2 row-span-1 relative rounded-xl overflow-hidden bg-surface-container-low">
<img class="w-full h-full object-cover" data-alt="A detailed view of the interior of a rural agricultural warehouse, focusing on stacks of supply bags neatly organized under warm, directional artificial lighting. The color palette is dominated by dark charcoal and deep greens, creating a sleek and sophisticated agri-tech mood. The visual style is premium and tactile, highlighting the grit of farming within a controlled, technology-driven marketplace environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpIvMoh0-ppopz_-GrTnIlVr1vz5UrGOXuKJql1bBccIOoUYP8VGYj9uFHRS2OIqhkZT4WyenHeEhoL_Nd5HhaB9qtL6V55MzNhPRxpvR7IPaG7PXvFa-nQlkca6AzVqJ-NEKJGK8GH1QVdv7Xh9SZXN8XI9kY_67GrdGW0qnOFiwbzjeDgG4s_ke5b1odcScs6gS-Xj0ezxkZEz8a6I-a-GifOstM_kFpz6hctyFbiNtyJxeYCXysTC3NSTaXs9poqcytBXhSJNH7"/>
<button class="absolute top-xs right-xs bg-error/20 backdrop-blur-md p-1.5 rounded-full text-error">
<span class="material-symbols-outlined text-xs">delete</span>
</button>
</div>
<div class="col-span-2 row-span-1 relative rounded-xl overflow-hidden bg-surface-container-low">
<img class="w-full h-full object-cover" data-alt="A macro photograph of high-quality makhana seeds, showing their intricate texture and pristine white color against a dark, contrasting background. The lighting is cinematic, casting soft glows and long shadows to create depth. The image represents the precision and premium quality of the agricultural product, maintaining the corporate modern noir aesthetic of the FenBridge platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMABs0AG6_8CK-d9GTPLOfIpROUX5O0I-X7URmVuP59LqerSyFoRM728xS502D9lHF1GLaJJ97iA3iYndg14F7cjZjs1WSiHiSkmsT-78U4IKDFS-_iByUDJJVrwrLpvtjNqnXlJPayyxuI0ERAhmSQBfvr2o_2xucCwdwFPY9z57DcGrrl4jEDOV5R4AZhVNnYKw9N6TOH628bAJr4A5mzYkfger8HHPuliSMZKEG6NcGXelq0ezzkkL4_Itphz6LJH4ASHVOL3di"/>
<button class="absolute top-xs right-xs bg-error/20 backdrop-blur-md p-1.5 rounded-full text-error">
<span class="material-symbols-outlined text-xs">delete</span>
</button>
</div>
</div>

<div class="max-w-screen-md mx-auto flex flex-col gap-sm">
<button class="w-full py-md bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded-xl flex justify-center items-center gap-xs active:scale-95 transition-all duration-150 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
        Continue
        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
