<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md sticky top-0 z-50">
<div class="flex items-center gap-md">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary dark:text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary truncate whitespace-nowrap">FenBridge</h1>
</div>
<button class="font-label-lg text-label-lg text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
            Skip
        </button>
</header>
<main class="flex-grow map-bg flex items-center justify-center px-margin py-xl" data-location="Bihar, India">
<!-- Content Container -->
<div class="w-full max-w-lg bg-surface-container-low/90 backdrop-blur-md border border-outline-variant rounded-xl p-lg shadow-xl">
<div class="mb-xl">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs truncate whitespace-nowrap">Add New Address</h2>
<p class="font-label-lg text-on-surface-variant">Enter the shipping details for your makhana consignments.</p>
</div>
<form class="space-y-md">
<!-- Address Title -->
<div class="group">
<label class="block font-label-sm text-on-surface-variant mb-xs ml-base">Address Title (e.g., Warehouse A)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-md text-on-surface placeholder:text-outline transition-all duration-200" placeholder="e.g. North Storage Hub" type="text"/>
</div>
<!-- Full Address -->
<div class="group">
<label class="block font-label-sm text-on-surface-variant mb-xs ml-base">Full Address</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-md text-on-surface placeholder:text-outline transition-all duration-200" placeholder="Street name, landmark, building number..." rows="3"></textarea>
</div>
<!-- City & State Grid -->
<div class="grid grid-cols-2 gap-md">
<div class="group">
<label class="block font-label-sm text-on-surface-variant mb-xs ml-base">City</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-md text-on-surface placeholder:text-outline transition-all duration-200" placeholder="Darbhanga" type="text"/>
</div>
<div class="group">
<label class="block font-label-sm text-on-surface-variant mb-xs ml-base">State</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-md text-on-surface placeholder:text-outline transition-all duration-200" placeholder="Bihar" type="text"/>
</div>
</div>
<!-- Postal Code -->
<div class="group">
<label class="block font-label-sm text-on-surface-variant mb-xs ml-base">Postal Code</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-md py-md text-on-surface placeholder:text-outline transition-all duration-200" placeholder="846001" type="text"/>
</div>
<!-- Primary Address Toggle -->
<div class="flex items-center justify-between bg-surface-container/50 p-md rounded-lg border border-outline-variant/30">
<div class="flex flex-col">
<span class="font-label-lg text-on-surface">Set as Primary Address</span>
<span class="text-[11px] text-on-surface-variant uppercase tracking-wider">Use for future invoices</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Primary Button -->
<div class="pt-md">
<button class="w-full bg-primary-container text-on-primary-container font-label-lg text-label-lg py-md rounded-xl hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-primary-container/20 flex justify-center items-center gap-xs">
<span class="material-symbols-outlined text-[20px]" data-icon="add_location_alt">add_location_alt</span>
                        Add Address
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Hidden on desktop as per responsive pivot) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center px-lg py-md mb-safe bg-surface dark:bg-surface shadow-md rounded-t-xl">
<button class="flex flex-col items-center justify-center text-outline-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined" data-icon="horizontal_rule">horizontal_rule</span>
<span class="font-label-sm text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-primary scale-110 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="horizontal_rule">horizontal_rule</span>
<span class="font-label-sm text-label-sm">Address</span>
</button>
</nav>
<!-- Decorative Illustration Segment -->
<div class="hidden lg:block fixed right-xl top-1/2 -translate-y-1/2 w-64 space-y-md pointer-events-none opacity-40">
<div class="h-32 bg-surface-container border border-outline-variant rounded-xl flex items-center justify-center overflow-hidden">
<img alt="" class="w-full h-full object-cover" data-alt="A cinematic, high-angle shot of a sprawling warehouse facility at twilight. The scene is bathed in a professional, moody atmosphere with emerald green security lighting highlights. Deep blacks and charcoal greys dominate the metallic textures of the storage containers, creating a sense of industrial scale and secure global logistics. The lighting is crisp and modern, emphasizing structural precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKZkCmlPjI1omIRlTTOgj3idn0YMxk8CsVL56wA11niZEiEToLE_wWbvSscFijjqJGkeC3kveSNmIJ07hzYEZZBEja0-EAcamLXvq337hXiYYX5AKI_ER6-UB91HyrItPdxz-GCSMQ8uNsaIdcED3AsOXpRAd_jsKkFATeM0LdkHBe661q7-ym5afX6nHCGAaAAIINBx9dYd88nCYO0kqHN8lHeVp5iMkXtkCKSr38BBSVfRJCtpuws8HM_2z_tTEASMG_2jefFQdZ"/>
</div>
<div class="h-2 bg-primary rounded-full w-1/2"></div>
<div class="h-2 bg-outline-variant rounded-full w-3/4"></div>
</div>
