<body class="bg-background text-on-background min-h-screen font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin h-16 bg-surface dark:bg-surface border-b border-outline-variant">
<div class="flex items-center gap-4">
<button onclick="window.location.href='../apply_seal_net/code.html'" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div>
<h1 class="text-headline-md font-headline-md text-primary leading-tight truncate whitespace-nowrap">Seal Evidence Photos</h1>
<p class="text-label-sm font-label-sm text-on-surface-variant">3 of 5 completed</p>
</div>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">more_vert</span>
</button>
</header>
<main class="pt-24 pb-32 px-margin max-w-2xl mx-auto">
<!-- Progress Bar Section -->
<div class="mb-xl">
<div class="w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container progress-glow w-[60%] transition-all duration-500"></div>
</div>
</div>
<!-- Helper Message -->
<div class="flex items-start gap-3 p-4 mb-xl bg-surface-container-low border border-outline-variant rounded-xl">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-label-lg font-label-lg text-on-surface-variant">Seal ID must be legible in the close-up photo for verification.</p>
</div>
<!-- Required Section -->
<section class="mb-xl">
<div class="flex items-center justify-between mb-md">
<h2 class="text-headline-md font-headline-md text-on-surface truncate whitespace-nowrap">Required Photos</h2>
<span class="text-label-sm font-label-sm px-2 py-1 bg-primary-container/10 text-primary border border-primary/20 rounded-full">3 Mandatory</span>
</div>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-gutter">
<!-- Tile: Seal close-up -->
<div class="relative group aspect-square">
<div class="w-full h-full border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-lowest hover:border-primary transition-all cursor-pointer group-active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant text-3xl mb-2">photo_camera</span>
<span class="text-label-sm font-label-sm text-center px-2 text-on-surface-variant group-hover:text-primary">Seal close-up</span>
</div>
</div>
<!-- Tile: Bags + net -->
<div class="relative group aspect-square">
<div class="w-full h-full border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-lowest hover:border-primary transition-all cursor-pointer group-active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant text-3xl mb-2">inventory_2</span>
<span class="text-label-sm font-label-sm text-center px-2 text-on-surface-variant group-hover:text-primary">Bags + net</span>
</div>
</div>
<!-- Tile: Warehouse wide -->
<div class="relative group aspect-square">
<div class="w-full h-full border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center bg-surface-container-lowest hover:border-primary transition-all cursor-pointer group-active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant text-3xl mb-2">factory</span>
<span class="text-label-sm font-label-sm text-center px-2 text-on-surface-variant group-hover:text-primary">Warehouse wide</span>
</div>
</div>
</div>
</section>
<!-- Optional Section -->

<div class="flex items-center justify-between mb-md">
<h2 class="text-headline-md font-headline-md text-on-surface truncate whitespace-nowrap">Add more (optional)</h2>
</div>

<div class="relative group aspect-square">
<div class="w-full h-full border-2 border-dashed border-outline rounded-xl flex flex-col items-center justify-center bg-surface-container hover:bg-surface-container-high transition-all cursor-pointer group-active:scale-95">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center mb-2">

</div>
</div>
</div>
