<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface flex justify-between items-center w-full px-margin py-md sticky top-0 z-50">
<div class="flex items-center gap-sm">
<button class="text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary truncate whitespace-nowrap">FenBridge</h1>
</div>
<button class="font-label-lg text-label-lg text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity">Skip</button>
</header>
<main class="flex-grow px-margin pt-xl pb-32 max-w-2xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-xl">
<div class="flex justify-between items-end mb-xs">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Step 1 of 5</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">20% Complete</span>
</div>
<div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[20%] transition-all duration-500"></div>
</div>
</div>
<h2 class="font-headline-lg text-headline-lg mb-xl truncate whitespace-nowrap">What grade and how much?</h2>
<!-- Section 1: Grade Selection -->
<section class="mb-xl">
<h3 class="font-label-lg text-label-lg text-on-surface-variant mb-md uppercase tracking-wide">Grade Selection</h3>
<div class="grid grid-cols-1 gap-md">
<!-- Grade A -->
<label class="relative group cursor-pointer">
<input class="sr-only peer" name="grade" type="radio" value="a"/>
<div class="grade-card p-md rounded-xl border border-outline-variant bg-surface-container-low transition-all duration-200 peer-checked:grade-card-active peer-checked:border-primary">
<div class="flex justify-between items-start mb-sm">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface">Grade A - Premium</h4>
<p class="font-label-sm text-label-sm text-on-surface-variant">Export quality, large size makhana</p>
</div>
<span class="bg-primary-container/10 text-primary-fixed-dim px-sm py-xs rounded-full font-label-sm text-label-sm border border-primary/20">
                                ~₹1,250/kg
                            </span>
</div>
<div class="flex flex-wrap gap-xs">
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Moisture: &lt;5%</span>
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Foreign Matter: 0%</span>
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Size: 18mm+</span>
</div>
<div class="absolute top-md right-md opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Grade B -->
<label class="relative group cursor-pointer">
<input checked="" class="sr-only peer" name="grade" type="radio" value="b"/>
<div class="grade-card p-md rounded-xl border border-outline-variant bg-surface-container-low transition-all duration-200 peer-checked:grade-card-active peer-checked:border-primary">
<div class="flex justify-between items-start mb-sm">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface">Grade B - Standard</h4>
<p class="font-label-sm text-label-sm text-on-surface-variant">Best for domestic processing</p>
</div>
<span class="bg-primary-container/10 text-primary-fixed-dim px-sm py-xs rounded-full font-label-sm text-label-sm border border-primary/20">
                                ~₹1,000/kg
                            </span>
</div>
<div class="flex flex-wrap gap-xs">
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Moisture: 7-9%</span>
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Foreign Matter: &lt;1%</span>
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Size: 14-17mm</span>
</div>
<div class="absolute top-md right-md opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
<!-- Grade C -->
<label class="relative group cursor-pointer">
<input class="sr-only peer" name="grade" type="radio" value="c"/>
<div class="grade-card p-md rounded-xl border border-outline-variant bg-surface-container-low transition-all duration-200 peer-checked:grade-card-active peer-checked:border-primary">
<div class="flex justify-between items-start mb-sm">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface">Grade C - Industrial</h4>
<p class="font-label-sm text-label-sm text-on-surface-variant">Flour and mixed-use makhana</p>
</div>
<span class="bg-primary-container/10 text-primary-fixed-dim px-sm py-xs rounded-full font-label-sm text-label-sm border border-primary/20">
                                ~₹750/kg
                            </span>
</div>
<div class="flex flex-wrap gap-xs">
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Moisture: &lt;12%</span>
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Foreign Matter: &lt;3%</span>
<span class="bg-surface-container-highest text-on-surface-variant px-xs py-1 rounded-sm font-label-sm text-[10px] uppercase tracking-tighter">Size: Mixed</span>
</div>
<div class="absolute top-md right-md opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</label>
</div>
</section>
<!-- Section 2: Quantity -->
<section class="mb-xl">
<h3 class="font-label-lg text-label-lg text-on-surface-variant mb-md uppercase tracking-wide">Required Quantity</h3>
<div class="relative mb-lg">
<label class="absolute -top-3 left-3 px-1 bg-background text-primary font-label-sm text-label-sm z-10">Total Quantity (Kilograms)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-xl p-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none text-headline-md transition-all" placeholder="Enter amount..." type="number"/>
<div class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant font-label-lg">KG</div>
</div>
<div class="flex flex-wrap gap-sm">
<button class="px-lg py-sm rounded-full border border-outline-variant bg-surface-container-high text-on-surface font-label-lg hover:border-primary active:scale-95 transition-all">100kg</button>
<button class="px-lg py-sm rounded-full border border-outline-variant bg-surface-container-high text-on-surface font-label-lg hover:border-primary active:scale-95 transition-all">250kg</button>
<button class="px-lg py-sm rounded-full border border-primary bg-primary/10 text-primary font-label-lg hover:bg-primary/20 active:scale-95 transition-all">500kg</button>
<button class="px-lg py-sm rounded-full border border-outline-variant bg-surface-container-high text-on-surface font-label-lg hover:border-primary active:scale-95 transition-all">1000kg</button>
</div>
</section>
<!-- Dynamic Context Info Card (Agri-Noir) -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-md flex items-start gap-md">
<span class="material-symbols-outlined text-primary mt-1">info</span>
<div class="space-y-1">
<p class="font-label-lg text-label-lg text-on-surface">Market Dynamic Pricing</p>
<p class="font-body-md text-on-surface-variant text-sm">Large orders (500kg+) may qualify for direct institutional logistics handling and reduced gateway fees.</p>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 w-full bg-surface p-margin flex justify-between items-center z-50 shadow-[0_-8px_24px_rgba(0,0,0,0.5)]">
<div class="hidden md:block">
<p class="font-label-sm text-label-sm text-on-surface-variant">Est. Requirement Value</p>
<p class="font-headline-md text-headline-md text-on-surface">₹5,00,000</p>
</div>
<button class="w-full md:w-auto md:min-w-[200px] h-[56px] flex items-center justify-center gap-sm bg-primary-container text-on-primary-container rounded-xl font-label-lg text-label-lg hover:opacity-90 active:scale-95 transition-all shadow-lg">
<span>Continue</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>


    <script src="../../../../../app_logic.js"></script>
</body></html>
