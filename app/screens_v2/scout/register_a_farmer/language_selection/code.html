<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface border-b border-outline-variant">

    </div>
</header>

    </div>

<p class="font-body-lg text-body-lg text-on-surface-variant">We'll send notifications in this language.</p>
</div>
<!-- Language Tiles (Bento inspired stack) -->
<div class="space-y-4">
<!-- English - Selected State -->
<button class="group w-full flex items-center justify-between p-6 bg-primary-container border-2 border-primary rounded-xl text-left transition-all hover:brightness-110 active:scale-[0.98]">

<span class="font-label-md text-label-md text-on-primary-container opacity-80">Default System Language</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-on-primary-container flex items-center justify-center">
<div class="w-3 h-3 bg-on-primary-container rounded-full"></div>
</div>
</button>
<!-- Hindi - Interactive State -->

</div>
</button>

</div>
<div class="w-6 h-6 rounded-full border border-outline-variant flex items-center justify-center group-hover:border-primary">
</div>
</button>
</div>
