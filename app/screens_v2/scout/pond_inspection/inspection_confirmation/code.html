    }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md overflow-hidden">
<!-- Top App Bar (Shared Component Reference) -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-margin-mobile h-14 fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100 ease-in-out">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">Step 5 of 5</h1>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100 ease-in-out">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-14 text-center max-w-lg mx-auto">
<!-- Success Animation Placeholder / Icon -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary opacity-20 blur-3xl rounded-full"></div>
<div class="relative bg-surface-container-high w-24 h-24 rounded-full flex items-center justify-center border-2 border-primary ring-8 ring-primary-container/10">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Success Message -->
<h2 class="font-headline-md text-headline-md mb-2 text-on-surface">Inspection Submitted!</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 px-4">
            Pond inspection for <span class="text-primary font-mono-data">POND-1024</span> has been recorded and synchronized with the central repository.
        </p>
<!-- Summary Chips -->
<div class="flex flex-wrap justify-center gap-2 mb-10">
<div class="bg-surface-container px-3 py-1.5 rounded-lg border border-outline-variant flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[16px]" data-icon="id_card">id_card</span>
<span class="font-label-md text-label-md text-on-surface uppercase tracking-wider">POND-1024</span>
</div>
<div class="bg-primary-container px-3 py-1.5 rounded-lg border border-primary/20 flex items-center gap-2">
<span class="material-symbols-outlined text-on-primary-container text-[16px]" data-icon="speed">speed</span>
<span class="font-label-md text-label-md text-on-primary-container">Readiness 6/10</span>
</div>
<div class="bg-surface-container px-3 py-1.5 rounded-lg border border-outline-variant flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[16px]" data-icon="analytics">analytics</span>
<span class="font-label-md text-label-md text-on-surface">4 Readings</span>
</div>
</div>
<!-- Bento Style Summary Card -->
<div class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-6 text-left mb-10 grid grid-cols-2 gap-4">
<div class="col-span-2 pb-2 border-b border-outline-variant">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Brief Summary</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-md text-label-md text-on-surface-variant">Water level</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(111,251,190,0.6)]"></span>
<span class="font-mono-data text-mono-data text-on-surface">Normal</span>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-md text-label-md text-on-surface-variant">Algae</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_rgba(149,211,186,0.6)]"></span>
<span class="font-mono-data text-mono-data text-on-surface">Light</span>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-md text-label-md text-on-surface-variant">Turbidity</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-on-surface-variant/30"></span>
<span class="font-mono-data text-mono-data text-on-surface">Low</span>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-md text-label-md text-on-surface-variant">DO Status</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(111,251,190,0.6)]"></span>
<span class="font-mono-data text-mono-data text-on-surface">Stable</span>
</div>
</div>
</div>
<!-- Call to Actions -->
<div class="w-full flex flex-col gap-3">
<button class="bg-primary text-on-primary w-full py-4 rounded-xl font-label-md text-label-md uppercase tracking-widest flex items-center justify-center gap-2 hover:brightness-110 transition-all active:scale-95 duration-100 ease-in-out">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                Back to Today
            </button>
<button class="bg-transparent border border-outline text-on-surface w-full py-4 rounded-xl font-label-md text-label-md uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-surface-container-high transition-all active:scale-95 duration-100 ease-in-out">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                View Pond Detail
            </button>
</div>
</main>
<!-- Decorative Industrial Element (Noir Background Detail) -->
<div class="fixed bottom-0 left-0 right-0 h-1/3 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none z-[-1]"></div>
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary/10 blur-[100px] rounded-full pointer-events-none z-[-1]"></div>
