<style>
    body {
      background-color: #0e1511;
      color: #dde4dd;
      -webkit-font-smoothing: antialiased;

<body class="font-body-md text-on-surface selection:bg-primary selection:text-on-primary">
<header class="fixed top-0 z-50 flex justify-between items-center w-full px-margin-mobile h-14 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-100 ease-in-out hover:bg-surface-container-high transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<div>
<h1 class="font-headline-sm text-headline-sm text-on-surface">Assess Pond Conditions</h1>
<p class="font-label-md text-label-md text-on-surface-variant">Step 2 of 5</p>
</div>
</div>
<button class="active:scale-95 duration-100 ease-in-out hover:bg-surface-container-high transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="mt-14 mb-24 px-margin-mobile pt-6 max-w-container-max mx-auto">
<section class="mb-8 relative overflow-hidden rounded-lg h-48 bg-surface-container border border-outline-variant">
<img alt="High-tech hydroponic pond system" class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="A top-down cinematic view of an industrial hydroponic water pond inside a high-tech agricultural facility at night. The water reflects shimmering emerald green LED lights that illuminate the nutrient-rich surface. The surrounding infrastructure is composed of dark, brushed metal frames and technical piping. The atmosphere is nocturnal and noir, emphasizing precision engineering and automated environmental monitoring in a deep-tech agricultural setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuADrP-pfJQD8v4i26ne34Jj5MNqZ62vC9_N_WN_k7n5ANKzmdwz6XtmNZsjP-r1fvpvyWEx2si5HARG3EnSQmU0-I8iBzrzo2HiSw3QN8FzspFE66rPh18ZwBEzlf-yg5ZhnN-Gdz0uIKJ1at5YINuxRwjcha-fRI_E3FXAZwM784ahhA-ZhwiEt1W9eyvqV2gqCMpdA4m1E3QLxF0eGkqDKY5IakbPdOKQcpzD9-kHx4HxQjq_ba-a7C6Z7f9PxFWUu1aK8Iy-YT5r"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4">
<span class="font-label-md text-label-md px-2 py-1 bg-primary text-on-primary rounded-sm uppercase tracking-widest">Active Monitoring</span>
</div>
</section>
<div class="space-y-6">
<!-- Water Level -->
<div class="p-4 bg-surface-container-low border border-outline-variant rounded-lg">
<div class="flex justify-between items-center mb-4">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">01. Water Level</label>
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="water_drop">water_drop</span>
</div>
<div class="grid grid-cols-3 gap-1 bg-surface-container p-1 rounded-sm border border-outline-variant">
<button class="py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high transition-all">Low</button>
<button class="py-3 font-label-md text-label-md bg-primary text-on-primary shadow-sm rounded-sm">Normal</button>
<button class="py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high transition-all">High</button>
</div>
</div>
<!-- Algae Presence -->
<div class="p-4 bg-surface-container-low border border-outline-variant rounded-lg">
<div class="flex justify-between items-center mb-4">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">02. Algae Presence</label>
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="microbiology">microbiology</span>
</div>
<div class="grid grid-cols-3 gap-1 bg-surface-container p-1 rounded-sm border border-outline-variant">
<button class="py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high transition-all">None</button>
<button class="py-3 font-label-md text-label-md bg-primary text-on-primary shadow-sm rounded-sm">Light</button>
<button class="py-3 font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-high transition-all">Heavy</button>
</div>
</div>
<!-- Pest/Disease Flags -->
<div class="p-4 bg-surface-container-low border border-outline-variant rounded-lg">
<div class="flex justify-between items-center mb-4">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">03. Pest/Disease Flags</label>
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="pest_control">pest_control</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-primary-container text-on-primary-container font-label-md text-label-md border border-primary/20 rounded-full flex items-center gap-2">
            Leaf Spot <span class="material-symbols-outlined text-[14px]" data-icon="close">close</span>
</button>
<button class="px-4 py-2 bg-primary-container text-on-primary-container font-label-md text-label-md border border-primary/20 rounded-full flex items-center gap-2">
            Stem Rot <span class="material-symbols-outlined text-[14px]" data-icon="close">close</span>
</button>
<button class="px-4 py-2 border border-outline-variant text-on-surface-variant font-label-md text-label-md rounded-full hover:bg-surface-container-high transition-colors">
            + Add Flag
          </button>
</div>
</div>
<!-- Harvest Readiness Score -->
<div class="p-4 bg-surface-container-low border border-outline-variant rounded-lg">
<div class="flex justify-between items-end mb-6">
<div>
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block mb-1">04. Harvest Readiness Score</label>
<p class="font-body-md text-body-md text-on-surface-variant">Estimated maturity based on biomass</p>
</div>
<div class="text-right">
<span class="font-mono-data text-display-lg text-primary leading-none">6<span class="text-headline-md opacity-40">/10</span></span>
</div>
</div>
<div class="px-2">
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" max="10" min="1" type="range" value="6"/>
<div class="flex justify-between mt-2 font-mono-data text-[10px] text-outline">
<span>MIN [01]</span>
<span>OPTIMAL [08]</span>
<span>MAX [10]</span>
</div>
</div>
</div>
</div>
<!-- Quick Analysis Overlay (Aesthetic Bento/Technical Detail) -->
<div class="mt-8 grid grid-cols-2 gap-4">
<div class="p-4 bg-surface-container-highest border border-outline-variant rounded-lg flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-secondary text-[24px] mb-2" data-icon="query_stats">query_stats</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Biomass Est.</span>
<span class="font-mono-data text-headline-sm text-primary">12.4 kg/m²</span>
</div>
<div class="p-4 bg-surface-container-highest border border-outline-variant rounded-lg flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-secondary text-[24px] mb-2" data-icon="sensors">sensors</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">pH Sensor</span>
<span class="font-mono-data text-headline-sm text-primary">6.8 [OK]</span>
</div>
</div>
</main>
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface/80 backdrop-blur-md">
<button class="w-full h-14 bg-primary text-on-primary font-headline-sm text-headline-sm rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
      Continue
      <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</footer>
