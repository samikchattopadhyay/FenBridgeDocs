<body class="bg-background text-on-background selection:bg-primary/30">
<!-- Top AppBar - Following JSON Logic (Shell Navigation Hidden for Success State) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin h-16 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<h1 class="text-headline-md font-headline-md font-bold text-primary truncate whitespace-nowrap">Quality Inspection</h1>
</div>
<button class="p-2 hover:bg-surface-container-high transition-colors rounded-full text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="min-h-screen flex flex-col items-center justify-center px-margin pt-16 pb-32">
<!-- Center Success Section -->
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Hero Illustration with Glassmorphism -->
<div class="relative w-48 h-48 mb-xl flex items-center justify-center">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[80px] rounded-full"></div>
<!-- Icon Composition -->
<div class="relative z-10 w-32 h-32 bg-surface-container border border-outline-variant rounded-full flex items-center justify-center shadow-xl">
<div class="absolute -top-2 -right-2 bg-primary text-on-primary p-2 rounded-xl shadow-lg border-2 border-background">
<span class="material-symbols-outlined text-[24px]" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="magnifying_glass">magnification_large</span>
<!-- Note: Shield icon overlay for the 'protection/security' aspect -->
<div class="absolute -bottom-1 -left-1 opacity-40">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant" data-icon="shield">shield</span>
</div>
</div>
</div>
<!-- Headlines -->
<h2 class="text-headline-lg font-headline-lg text-on-surface mb-xs truncate whitespace-nowrap">Re-check submitted</h2>
<!-- Outcome Echo Chip -->
<div class="inline-flex items-center gap-xs px-md py-1.5 bg-primary/10 border border-primary/20 rounded-full mb-lg">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-label-lg font-label-lg text-primary">Clean — lot continues</span>
</div>
<!-- Sync Status -->
<div class="flex items-center gap-xs px-md py-2 bg-surface-container-low border border-outline-variant rounded-xl mb-xl">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant" data-icon="sync">sync</span>
<p class="text-body-md font-body-md text-on-surface-variant">Queued to sync</p>
</div>
<!-- Info Card (Agri-Tech Noir style) -->
<div class="w-full bg-surface-container border border-outline-variant rounded-xl p-md text-left mb-xl">
<div class="flex justify-between items-center mb-sm">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">Inspection ID</span>
<span class="text-label-lg font-label-lg text-on-surface">#QC-8821-M</span>
</div>
<div class="flex justify-between items-center">
<span class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">Timestamp</span>
<span class="text-label-lg font-label-lg text-on-surface">14:42 Local</span>
</div>
</div>
</div>

<div class="fixed bottom-0 left-0 w-full p-margin bg-gradient-to-t from-background via-background/95 to-transparent flex flex-col gap-md">

<!-- Visual Texture Element: Not an image but a CSS gradient to simulate agricultural precision depth -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#4edea3 1px, transparent 1px); background-size: 32px 32px;"></div>
